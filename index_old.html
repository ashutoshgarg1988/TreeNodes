<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Tree Layout</title>

  <style>
    body {
      margin: 0;
      background: #eee;
      display: flex;
      justify-content: center;
    }

    #stage {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: #f7f7f7;
      overflow: auto;
      font-family: Arial;
    }

    .node {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid #2f49c6;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      background: white;
      font-weight: bold;
    }

    svg {
      position: absolute;
      left: 0;
      top: 0;
    }
  </style>
</head>

<body>

  <div id="stage">

    <svg id="lines" width="1920" height="1080"></svg>

  </div>

  <script>


    /* JSON DATA */

    const treeData = {
      name: "A",
      children: [
        {
          name: "B",
          children: [
            {
              name: "D",
              children: [
                { name: "H" },
                { name: "I" },
                { name: "K" }
              ]
            },
            {
              name: "E",
              children: [
                { name: "J" },
                { name: "L" }
              ]
            }
          ]
        },
        {
          name: "C",
          children: [
            {
              name: "F",
              children: [
                { name: "M" },
                { name: "N" }
              ]
            },
            { name: "G" }
          ]
        }
      ]
    };



    const stage = document.getElementById("stage");
    const svg = document.getElementById("lines");


    const levelHeight = 180;
    const nodeSize = 60;



    function getDepth(node) {

      if (!node.children) return 1;

      let depths = node.children.map(getDepth);

      return 1 + Math.max(...depths);

    }



    function layout(node, depth = 0, xMin = 0, xMax = 1920) {

      const x = (xMin + xMax) / 2;
      const y = 120 + depth * levelHeight;

      node.x = x;
      node.y = y;

      if (node.children) {

        const step = (xMax - xMin) / node.children.length;

        node.children.forEach((child, i) => {

          layout(
            child,
            depth + 1,
            xMin + i * step,
            xMin + (i + 1) * step
          );

        });

      }

    }



    function drawNode(node) {

      const div = document.createElement("div");

      div.className = "node";
      div.innerText = node.name;

      div.style.left = (node.x - nodeSize / 2) + "px";
      div.style.top = (node.y - nodeSize / 2) + "px";

      stage.appendChild(div);

    }



    function drawLine(x1, y1, x2, y2) {

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);

      line.setAttribute("stroke", "#2f49c6");
      line.setAttribute("stroke-width", "3");

      svg.appendChild(line);

    }



    function render(node) {
      drawNode(node);
      if (node.children) {
        node.children.forEach(child => {
          drawLine(node.x, node.y, child.x, child.y);
          render(child);
        });
      }
    }
    layout(treeData);
    render(treeData);
  </script>

</body>

</html>
